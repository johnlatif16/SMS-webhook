<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>لوحة التحكم - SMS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        /* الحاوية الرئيسية */
        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* شريط العلوي */
        .header {
            background: white;
            border-radius: 15px;
            padding: 20px 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header h2 {
            color: #667eea;
            font-size: 24px;
            font-weight: 600;
        }

        .header-info {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #666;
        }

        .user-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
        }

        /* زر تسجيل الخروج */
        .logout-btn {
            background: linear-gradient(135deg, #f56565 0%, #ed64a6 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(245, 101, 101, 0.4);
        }

        .logout-btn:active {
            transform: translateY(0);
        }

        /* بطاقة التحكم */
        .control-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .control-card h3 {
            color: #333;
            font-size: 18px;
        }

        .load-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .load-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .load-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* مؤشر التحميل */
        .loading-container {
            text-align: center;
            padding: 40px;
            display: none;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* قائمة الرسائل */
        .messages-container {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .messages-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
            flex-wrap: wrap;
            gap: 10px;
        }

        .messages-header h3 {
            color: #333;
            font-size: 18px;
        }

        .message-count {
            background: #667eea;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }

        /* قائمة الرسائل */
        .messages-list {
            list-style: none;
        }

        .message-item {
            background: #f8f9fa;
            margin-bottom: 12px;
            padding: 15px;
            border-radius: 10px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 15px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }

        .message-avatar {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
            flex-shrink: 0;
        }

        .message-content {
            flex: 1;
        }

        .message-sender {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
            font-size: 16px;
        }

        .message-text {
            color: #666;
            font-size: 14px;
            word-break: break-word;
        }

        .message-time {
            color: #999;
            font-size: 12px;
            margin-top: 5px;
        }

        /* حالة عدم وجود رسائل */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        /* رسائل الخطأ */
        .error-message {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 10px;
        }

        /* تحسينات للأجهزة المختلفة */
        @media (max-width: 768px) {
            body {
                padding: 15px;
            }

            .header {
                padding: 15px 20px;
            }

            .header h2 {
                font-size: 20px;
            }

            .user-info span {
                font-size: 14px;
            }

            .control-card {
                padding: 20px;
            }

            .load-btn {
                padding: 10px 20px;
                font-size: 14px;
            }

            .message-item {
                padding: 12px;
            }

            .message-avatar {
                width: 35px;
                height: 35px;
                font-size: 14px;
            }

            .message-sender {
                font-size: 14px;
            }

            .message-text {
                font-size: 13px;
            }
        }

        @media (max-width: 480px) {
            .header {
                flex-direction: column;
                text-align: center;
            }

            .header-info {
                justify-content: center;
            }

            .control-card {
                flex-direction: column;
                text-align: center;
            }

            .message-item {
                flex-direction: column;
                text-align: center;
            }

            .message-avatar {
                width: 40px;
                height: 40px;
            }
        }

        @media (min-width: 1200px) {
            .dashboard-container {
                max-width: 1400px;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- الشريط العلوي -->
        <div class="header">
            <h2>📱 نظام إدارة الرسائل SMS</h2>
            <div class="header-info">
                <div class="user-info">
                    <div class="user-icon" id="userIcon">
                        👤
                    </div>
                    <span id="username">مرحباً بك</span>
                </div>
                <button class="logout-btn" onclick="logout()">
                    🚪 تسجيل الخروج
                </button>
            </div>
        </div>

        <!-- بطاقة التحكم -->
        <div class="control-card">
            <h3>📨 قائمة الرسائل الواردة</h3>
            <button class="load-btn" onclick="loadMessages()" id="loadBtn">
                🔄 تحميل الرسائل
            </button>
        </div>

        <!-- رسالة الخطأ -->
        <div class="error-message" id="errorMessage">
            ⚠️ <span id="errorText">حدث خطأ في تحميل الرسائل</span>
        </div>

        <!-- مؤشر التحميل -->
        <div class="loading-container" id="loadingContainer">
            <div class="spinner"></div>
            <p style="margin-top: 15px; color: white;">جاري تحميل الرسائل...</p>
        </div>

        <!-- حاوية الرسائل -->
        <div class="messages-container" id="messagesContainer" style="display: none;">
            <div class="messages-header">
                <h3>جميع الرسائل</h3>
                <span class="message-count" id="messageCount">0 رسالة</span>
            </div>
            <ul class="messages-list" id="list"></ul>
        </div>
    </div>

    <script>
        // الحصول على التوكن
        let token = localStorage.getItem("token");
        
        // التحقق من وجود التوكن
        if (!token) {
            window.location.href = "/login.html";
        }

        // محاولة الحصول على اسم المستخدم من localStorage (يمكن تخزينه عند تسجيل الدخول)
        const username = localStorage.getItem("username") || "المستخدم";
        document.getElementById("username").innerHTML = `مرحباً ${username}`;
        
        // تعيين أيقونة المستخدم
        const userIcon = document.getElementById("userIcon");
        if (username !== "المستخدم") {
            userIcon.textContent = username.charAt(0).toUpperCase();
        }

        // عناصر DOM
        const list = document.getElementById("list");
        const loadBtn = document.getElementById("loadBtn");
        const loadingContainer = document.getElementById("loadingContainer");
        const messagesContainer = document.getElementById("messagesContainer");
        const errorMessage = document.getElementById("errorMessage");
        const errorText = document.getElementById("errorText");
        const messageCount = document.getElementById("messageCount");

        // دالة عرض الخطأ
        function showError(message) {
            errorText.textContent = message;
            errorMessage.style.display = "flex";
            setTimeout(() => {
                errorMessage.style.display = "none";
            }, 5000);
        }

        // دالة إخفاء الخطأ
        function hideError() {
            errorMessage.style.display = "none";
        }

        // دالة تحميل الرسائل
        async function loadMessages() {
            // إظهار مؤشر التحميل وإخفاء الحاوية
            loadingContainer.style.display = "block";
            messagesContainer.style.display = "none";
            hideError();
            
            // تعطيل الزر أثناء التحميل
            loadBtn.disabled = true;

            try {
                // التحقق من وجود التوكن
                token = localStorage.getItem("token");
                if (!token) {
                    throw new Error("انتهت صلاحية الجلسة");
                }

                const response = await fetch("/api/messages", {
                    method: "GET",
                    headers: {
                        "Authorization": token,
                        "Content-Type": "application/json"
                    }
                });

                if (response.status === 401) {
                    // التوكن غير صالح
                    localStorage.removeItem("token");
                    localStorage.removeItem("username");
                    alert("انتهت صلاحية الجلسة. سيتم إعادة توجيهك لتسجيل الدخول");
                    window.location.href = "/login.html";
                    return;
                }

                if (!response.ok) {
                    throw new Error(`خطأ في الخادم: ${response.status}`);
                }

                const data = await response.json();
                
                // التحقق من أن البيانات عبارة عن مصفوفة
                if (!Array.isArray(data)) {
                    throw new Error("بيانات غير صالحة من الخادم");
                }

                // عرض الرسائل
                displayMessages(data);
                
                // تحديث عدد الرسائل
                messageCount.textContent = `${data.length} رسالة`;
                
                // إظهار حاوية الرسائل
                messagesContainer.style.display = "block";
                
            } catch (error) {
                console.error("Error loading messages:", error);
                showError(error.message || "فشل في تحميل الرسائل. يرجى المحاولة مرة أخرى");
                
                // عرض حالة فارغة
                list.innerHTML = `
                    <div class="empty-state">
                        <div style="font-size: 48px;">📭</div>
                        <p>لا توجد رسائل لعرضها</p>
                        <p style="font-size: 12px; margin-top: 10px;">انقر على زر تحميل الرسائل للمحاولة مرة أخرى</p>
                    </div>
                `;
                messagesContainer.style.display = "block";
            } finally {
                // إخفاء مؤشر التحميل وإعادة تمكين الزر
                loadingContainer.style.display = "none";
                loadBtn.disabled = false;
            }
        }

        // دالة عرض الرسائل في الواجهة
        function displayMessages(messages) {
            if (!messages || messages.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div style="font-size: 48px;">📭</div>
                        <p>لا توجد رسائل لعرضها</p>
                        <p style="font-size: 12px; margin-top: 10px;">قم بتحميل الرسائل مرة أخرى</p>
                    </div>
                `;
                return;
            }

            // عرض الرسائل مع تحسين التنسيق
            list.innerHTML = messages.map((msg, index) => {
                // استخراج البيانات مع التحقق من وجودها
                const sender = msg.sender || msg.from || "مرسل غير معروف";
                const message = msg.message || msg.text || msg.content || "لا يوجد محتوى";
                const time = msg.time || msg.timestamp || msg.created_at || new Date().toLocaleString();
                const senderInitial = sender.charAt(0).toUpperCase();
                
                return `
                    <li class="message-item" style="animation-delay: ${index * 0.05}s">
                        <div class="message-avatar">
                            ${senderInitial}
                        </div>
                        <div class="message-content">
                            <div class="message-sender">
                                📱 ${escapeHtml(sender)}
                            </div>
                            <div class="message-text">
                                ${escapeHtml(message)}
                            </div>
                            <div class="message-time">
                                🕒 ${formatTime(time)}
                            </div>
                        </div>
                    </li>
                `;
            }).join('');
        }

        // دالة لتنسيق الوقت
        function formatTime(time) {
            try {
                const date = new Date(time);
                if (isNaN(date.getTime())) {
                    return time;
                }
                return date.toLocaleString('ar-EG', {
                    year: 'numeric',
                    month: 'numeric',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
            } catch (e) {
                return time;
            }
        }

        // دالة لحماية من XSS
        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // دالة تسجيل الخروج
        async function logout() {
            if (confirm("هل أنت متأكد من تسجيل الخروج؟")) {
                try {
                    // محاولة إعلام الخادم بتسجيل الخروج
                    const token = localStorage.getItem("token");
                    if (token) {
                        await fetch("/logout", {
                            method: "POST",
                            headers: {
                                "Authorization": token,
                                "Content-Type": "application/json"
                            }
                        }).catch(err => console.log("Logout error:", err));
                    }
                } catch (error) {
                    console.error("Error during logout:", error);
                } finally {
                    // مسح البيانات المحلية
                    localStorage.removeItem("token");
                    localStorage.removeItem("username");
                    
                    // إضافة تأثير بسيط
                    const btn = event.target.closest('.logout-btn');
                    btn.style.transform = "scale(0.95)";
                    
                    setTimeout(() => {
                        window.location.href = "/login";
                    }, 200);
                }
            }
        }

        // تحميل الرسائل تلقائياً عند فتح الصفحة
        document.addEventListener("DOMContentLoaded", () => {
            loadMessages();
            
            // إضافة تحديث تلقائي كل 30 ثانية (اختياري)
            // setInterval(() => {
            //     if (document.visibilityState === "visible") {
            //         loadMessages();
            //     }
            // }, 30000);
        });

        // إضافة معالجة للأزرار على الأجهزة اللمسية
        const buttons = document.querySelectorAll('button');
        buttons.forEach(btn => {
            btn.addEventListener('touchstart', function() {
                this.style.transform = 'scale(0.98)';
            });
            btn.addEventListener('touchend', function() {
                this.style.transform = 'scale(1)';
            });
        });
    </script>
</body>
</html>
