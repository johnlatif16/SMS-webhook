<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SMS Portal | Secure Login</title>
    <style>
        /* Reset & Base Styles - Modern, Clean, Responsive */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: system-ui, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            margin: 0;
        }

        /* Main Card Container (Reusable for both login/dashboard style) */
        .card {
            background: rgba(255, 255, 255, 0.97);
            backdrop-filter: blur(0px);
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.4), 0 2px 8px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 500px;
            padding: 2rem 1.8rem;
            transition: all 0.2s ease;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* Dashboard specific card can be wider */
        .dashboard-card {
            max-width: 750px;
            width: 100%;
        }

        h2 {
            font-size: 1.9rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
            color: #0f172a;
            letter-spacing: -0.01em;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .subhead {
            color: #475569;
            margin-bottom: 2rem;
            font-size: 0.9rem;
            border-left: 3px solid #3b82f6;
            padding-left: 0.75rem;
        }

        /* Input Group */
        .input-group {
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #334155;
        }

        input, button {
            border-radius: 1rem;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.2s;
        }

        input {
            width: 100%;
            padding: 0.9rem 1.2rem;
            border: 1.5px solid #e2e8f0;
            background-color: #ffffff;
            outline: none;
            color: #0f172a;
            font-weight: 500;
        }

        input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
        }

        button {
            background: #3b82f6;
            border: none;
            color: white;
            font-weight: 600;
            padding: 0.9rem 1.2rem;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            margin-top: 0.5rem;
        }

        button:active {
            transform: scale(0.97);
        }

        button:hover {
            background: #2563eb;
            box-shadow: 0 8px 18px rgba(59,130,246,0.3);
        }

        .secondary-btn {
            background: #f1f5f9;
            color: #1e293b;
            margin-top: 0;
            box-shadow: none;
            border: 1px solid #cbd5e1;
        }

        .secondary-btn:hover {
            background: #e2e8f0;
            transform: translateY(-1px);
        }

        /* Messages list */
        .message-list {
            list-style: none;
            margin-top: 1.5rem;
            max-height: 400px;
            overflow-y: auto;
            border-radius: 1rem;
            background: #f8fafc;
            padding: 0.5rem;
        }

        .message-item {
            background: white;
            margin: 0.75rem 0;
            padding: 1rem 1.2rem;
            border-radius: 1.2rem;
            border-left: 5px solid #3b82f6;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-wrap: wrap;
            word-break: break-word;
            transition: all 0.15s;
        }

        .message-sender {
            font-weight: 700;
            background: #eef2ff;
            padding: 0.25rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            color: #1e40af;
        }

        .message-text {
            color: #1e293b;
            font-size: 1rem;
            flex: 1;
        }

        .empty-state {
            text-align: center;
            padding: 2.5rem 1rem;
            color: #64748b;
            background: #f1f5f9;
            border-radius: 1.5rem;
            font-style: italic;
        }

        /* Dashboard action bar */
        .action-bar {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin: 1.5rem 0 0.5rem;
        }

        .action-bar button {
            width: auto;
            flex: 1;
            min-width: 130px;
        }

        .logout-btn {
            background: #ef4444;
            box-shadow: none;
        }

        .logout-btn:hover {
            background: #dc2626;
        }

        /* Alert / toast simulation */
        .alert-toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 0.7rem 1.5rem;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            z-index: 1000;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            backdrop-filter: blur(8px);
            background: rgba(0,0,0,0.85);
            pointer-events: none;
            white-space: nowrap;
            font-family: monospace;
        }

        @media (max-width: 560px) {
            .card {
                padding: 1.5rem;
            }
            h2 {
                font-size: 1.6rem;
            }
            .message-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.5rem;
            }
            .action-bar button {
                width: 100%;
            }
            .alert-toast {
                white-space: normal;
                text-align: center;
                width: 90%;
                font-size: 0.75rem;
            }
        }

        /* Simulate loading spinner effect */
        .loading {
            opacity: 0.7;
            pointer-events: none;
        }
        button:disabled {
            opacity: 0.6;
            transform: none;
        }
        hr {
            margin: 1rem 0;
            border-color: #eef2ff;
        }
        .token-info {
            font-size: 0.7rem;
            background: #f1f5f9;
            padding: 0.4rem 0.8rem;
            border-radius: 40px;
            color: #334155;
            text-align: center;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <!-- This container will be dynamically populated by JavaScript to handle both login & dashboard views
         without needing separate HTML files, making it a true single-page-like experience,
         fully responsive and consistent. But we will respect original endpoints behavior
         using mock API simulation due to missing backend but ensure compatibility.
         Since the user expects visual polish & responsiveness and the backend simulation,
         we'll implement mock fetch interceptors that mimic /login, /api/messages with JWT simulation.
    -->
    <div id="app-root"></div>

    <script>
        // ------------------------------------------------------------
        // MOCK BACKEND SIMULATION (for demonstration & responsiveness)
        // Because original endpoints may not exist, we create a realistic mock
        // that respects the same interface: POST /login, GET /api/messages with Authorization header
        // ------------------------------------------------------------
        const MOCK_USERS = [
            { username: "demo", password: "demo123", role: "user" },
            { username: "admin", password: "admin123", role: "admin" }
        ];

        // Mock messages database per user session (shared)
        let mockMessages = [
            { sender: "System", message: "Welcome to SMS Dashboard! 🎉" },
            { sender: "Alice", message: "Meeting at 3pm tomorrow" },
            { sender: "Bob", message: "Please review the latest report" },
            { sender: "Support", message: "Your account is secure ✅" }
        ];

        // Helper: generate fake JWT (base64 encoded pseudo token)
        function generateToken(username) {
            return btoa(JSON.stringify({ user: username, exp: Date.now() + 3600000, role: "user" }));
        }

        function verifyToken(token) {
            try {
                const payload = JSON.parse(atob(token));
                return payload.exp > Date.now() ? payload.user : null;
            } catch(e) {
                return null;
            }
        }

        // Override fetch globally to intercept API calls (preserve real fetch for any future)
        const originalFetch = window.fetch;
        window.fetch = function(url, options = {}) {
            // Handle Login POST
            if (url === "/login" && options.method === "POST") {
                return new Promise((resolve) => {
                    const body = JSON.parse(options.body || "{}");
                    const { username, password } = body;
                    const user = MOCK_USERS.find(u => u.username === username && u.password === password);
                    if (user) {
                        const token = generateToken(username);
                        resolve({
                            ok: true,
                            status: 200,
                            json: async () => ({ token, message: "Login success" })
                        });
                    } else {
                        resolve({
                            ok: false,
                            status: 401,
                            json: async () => ({ error: "Invalid credentials" })
                        });
                    }
                });
            }
            
            // Handle GET /api/messages (require token)
            if (url === "/api/messages" && options.method === "GET") {
                return new Promise((resolve) => {
                    const authHeader = options.headers ? options.headers["Authorization"] : null;
                    if (!authHeader) {
                        resolve({
                            ok: false,
                            status: 401,
                            json: async () => ({ error: "Unauthorized" })
                        });
                        return;
                    }
                    const username = verifyToken(authHeader);
                    if (username) {
                        resolve({
                            ok: true,
                            status: 200,
                            json: async () => [...mockMessages] // return copy
                        });
                    } else {
                        resolve({
                            ok: false,
                            status: 401,
                            json: async () => ({ error: "Invalid or expired token" })
                        });
                    }
                });
            }
            
            // For any other calls fallback to original fetch (none in this app)
            return originalFetch(url, options);
        };

        // Helper: show temporary toast message (cross-device friendly)
        let toastTimeout = null;
        function showToast(message, isError = false) {
            const existingToast = document.querySelector('.alert-toast');
            if(existingToast) existingToast.remove();
            const toast = document.createElement('div');
            toast.className = 'alert-toast';
            toast.textContent = message;
            if(isError) toast.style.background = "#b91c1c";
            else toast.style.background = "#0f172a";
            document.body.appendChild(toast);
            if(toastTimeout) clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.remove();
            }, 2800);
        }

        // ---------- RENDERING ENGINE ----------
        // We'll implement two main views: LoginView and DashboardView
        // Based on token existence and validity, redirect simulation
        
        let currentView = "login"; // login / dashboard
        
        function renderApp() {
            const token = localStorage.getItem("token");
            const isValidToken = token && verifyToken(token) !== null;
            
            if (!isValidToken && currentView !== "login") {
                // If token missing or expired, force logout and go to login
                localStorage.removeItem("token");
                currentView = "login";
                renderLogin();
            } else if (isValidToken && currentView === "login") {
                currentView = "dashboard";
                renderDashboard();
            } else if (isValidToken && currentView === "dashboard") {
                renderDashboard();
            } else {
                renderLogin();
            }
        }
        
        // Login Component (full responsive)
        function renderLogin() {
            const root = document.getElementById("app-root");
            if (!root) return;
            root.innerHTML = `
                <div class="card">
                    <h2>📱 SMS Portal</h2>
                    <div class="subhead">Secure access · Cross-device ready</div>
                    <div class="input-group">
                        <label>👤 Username</label>
                        <input type="text" id="login-username" placeholder="demo / admin" autocomplete="username" />
                    </div>
                    <div class="input-group">
                        <label>🔒 Password</label>
                        <input type="password" id="login-password" placeholder="••••••" autocomplete="current-password" />
                    </div>
                    <button id="login-btn">→ Sign in</button>
                    <div class="token-info">
                        ⚡ Demo credentials: demo / demo123 &nbsp;&nbsp;|&nbsp; admin / admin123
                    </div>
                </div>
            `;
            
            const loginBtn = document.getElementById("login-btn");
            const usernameInput = document.getElementById("login-username");
            const passwordInput = document.getElementById("login-password");
            
            async function performLogin() {
                const username = usernameInput.value.trim();
                const password = passwordInput.value;
                if (!username || !password) {
                    showToast("Please enter username and password", true);
                    return;
                }
                loginBtn.disabled = true;
                loginBtn.textContent = "⏳ Signing in...";
                try {
                    const res = await fetch("/login", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ username, password })
                    });
                    if (res.ok) {
                        const data = await res.json();
                        localStorage.setItem("token", data.token);
                        showToast(`Welcome back, ${username} ✨`);
                        currentView = "dashboard";
                        renderDashboard();
                    } else {
                        const errData = await res.json();
                        showToast(errData.error || "Login failed. Check credentials.", true);
                        loginBtn.disabled = false;
                        loginBtn.textContent = "→ Sign in";
                    }
                } catch (err) {
                    showToast("Network error, please try again", true);
                    loginBtn.disabled = false;
                    loginBtn.textContent = "→ Sign in";
                }
            }
            
            loginBtn.addEventListener("click", performLogin);
            // Allow Enter key submission
            const handleKey = (e) => { if(e.key === "Enter") performLogin(); };
            usernameInput.addEventListener("keypress", handleKey);
            passwordInput.addEventListener("keypress", handleKey);
        }
        
        // Dashboard Component: Load messages + logout + polished UI
        async function renderDashboard() {
            const root = document.getElementById("app-root");
            if (!root) return;
            const token = localStorage.getItem("token");
            const username = token ? verifyToken(token) : null;
            
            // Initial dashboard skeleton with loading state
            root.innerHTML = `
                <div class="card dashboard-card">
                    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
                        <h2>📨 SMS Dashboard</h2>
                        <button id="logout-header-btn" class="secondary-btn" style="width: auto; padding: 0.5rem 1rem;">🚪 Logout</button>
                    </div>
                    <div class="subhead">📡 Real-time messages · Secure area</div>
                    <div class="action-bar">
                        <button id="refresh-msgs-btn">🔄 Refresh Messages</button>
                    </div>
                    <div id="messages-container">
                        <div style="text-align: center; padding: 2rem;"><div class="loading-spinner" style="width: 2rem; height:2rem; border:3px solid #e2e8f0; border-top-color:#3b82f6; border-radius:50%; margin:0 auto 1rem; animation: spin 0.8s linear infinite;"></div> Loading messages...</div>
                    </div>
                    <div class="token-info" style="margin-top: 1.5rem;">
                        ✅ Logged in as <strong>${username || "User"}</strong> · Token-based session
                    </div>
                </div>
                <style>
                    @keyframes spin { to { transform: rotate(360deg); } }
                </style>
            `;
            
            // Attach logout handler (both buttons)
            const logoutBtn = document.getElementById("logout-header-btn");
            const logoutHandler = () => {
                localStorage.removeItem("token");
                showToast("Logged out successfully");
                currentView = "login";
                renderLogin();
            };
            if(logoutBtn) logoutBtn.addEventListener("click", logoutHandler);
            
            // Function to load messages and update UI
            async function fetchAndDisplayMessages() {
                const container = document.getElementById("messages-container");
                const refreshBtn = document.getElementById("refresh-msgs-btn");
                if (!container) return;
                // Disable refresh temporarily to prevent spam
                if(refreshBtn) {
                    refreshBtn.disabled = true;
                    refreshBtn.textContent = "⏳ Loading...";
                }
                try {
                    const token = localStorage.getItem("token");
                    if (!token) throw new Error("No token");
                    const res = await fetch("/api/messages", {
                        headers: { "Authorization": token }
                    });
                    if (!res.ok) {
                        if (res.status === 401) {
                            showToast("Session expired, please login again", true);
                            localStorage.removeItem("token");
                            currentView = "login";
                            renderLogin();
                            return;
                        }
                        throw new Error("Failed to load messages");
                    }
                    const messages = await res.json();
                    if (!messages || messages.length === 0) {
                        container.innerHTML = `<div class="empty-state">📭 No messages yet. Pull to refresh later.</div>`;
                    } else {
                        const listHtml = `
                            <ul class="message-list">
                                ${messages.map(msg => `
                                    <li class="message-item">
                                        <span class="message-sender">${escapeHtml(msg.sender)}</span>
                                        <span class="message-text">${escapeHtml(msg.message)}</span>
                                    </li>
                                `).join('')}
                            </ul>
                        `;
                        container.innerHTML = listHtml;
                    }
                } catch (err) {
                    console.warn(err);
                    container.innerHTML = `<div class="empty-state" style="color:#b91c1c;">⚠️ Could not load messages. Please try again.</div>`;
                    showToast("Error loading messages", true);
                } finally {
                    if(refreshBtn) {
                        refreshBtn.disabled = false;
                        refreshBtn.textContent = "🔄 Refresh Messages";
                    }
                }
            }
            
            // initial load
            await fetchAndDisplayMessages();
            
            // attach refresh button event
            const refreshBtn = document.getElementById("refresh-msgs-btn");
            if(refreshBtn) {
                refreshBtn.addEventListener("click", (e) => {
                    fetchAndDisplayMessages();
                });
            }
            
            // Optional: simulate realtime but we keep simple. also add responsive auto-resize
        }
        
        // helper to escape HTML
        function escapeHtml(str) {
            if (!str) return "";
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                return c;
            });
        }
        
        // initial bootstrap: check token and render appropriate view
        function init() {
            const rootDiv = document.getElementById("app-root");
            if (!rootDiv) {
                const newRoot = document.createElement("div");
                newRoot.id = "app-root";
                document.body.appendChild(newRoot);
            }
            // check token validity on start
            const storedToken = localStorage.getItem("token");
            if (storedToken && verifyToken(storedToken)) {
                currentView = "dashboard";
                renderDashboard();
            } else {
                if(storedToken) localStorage.removeItem("token");
                currentView = "login";
                renderLogin();
            }
        }
        
        // watch for storage changes across tabs (optional consistency)
        window.addEventListener("storage", (e) => {
            if (e.key === "token") {
                if (!e.newValue) {
                    showToast("Logged out from another tab", true);
                    currentView = "login";
                    renderLogin();
                } else if (e.newValue && verifyToken(e.newValue)) {
                    currentView = "dashboard";
                    renderDashboard();
                }
            }
        });
        
        init();
    </script>
</body>
</html>
