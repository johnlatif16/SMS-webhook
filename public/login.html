<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>تسجيل الدخول - نظام الإدارة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        /* حاوية البطاقة */
        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            width: 100%;
            max-width: 450px;
            transition: transform 0.3s ease;
        }

        .login-container:hover {
            transform: translateY(-5px);
        }

        /* رأس البطاقة */
        .login-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px 30px;
            text-align: center;
        }

        .login-header h2 {
            color: white;
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .login-header p {
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
        }

        /* جسم النموذج */
        .login-body {
            padding: 40px 30px;
        }

        /* مجموعة الحقول */
        .input-group {
            margin-bottom: 25px;
            position: relative;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
            outline: none;
            font-family: inherit;
        }

        .input-group input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        /* زر تسجيل الدخول */
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        /* رسائل الخطأ */
        .error-message {
            background-color: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-top: 15px;
            text-align: center;
            display: none;
        }

        /* مؤشر التحميل */
        .loading {
            display: none;
            text-align: center;
            margin-top: 15px;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* روابط إضافية */
        .extra-links {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }

        .extra-links a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            margin: 0 10px;
            transition: color 0.3s ease;
        }

        .extra-links a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        /* تحسينات للأجهزة الصغيرة */
        @media (max-width: 768px) {
            .login-header {
                padding: 30px 20px;
            }

            .login-header h2 {
                font-size: 24px;
            }

            .login-body {
                padding: 30px 20px;
            }

            .input-group input {
                padding: 10px 12px;
                font-size: 14px;
            }

            .login-btn {
                padding: 12px;
                font-size: 14px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 15px;
            }

            .login-header h2 {
                font-size: 22px;
            }

            .login-header p {
                font-size: 12px;
            }

            .input-group label {
                font-size: 13px;
            }
        }

        /* للأجهزة الكبيرة */
        @media (min-width: 1200px) {
            .login-container {
                max-width: 500px;
            }
        }

        /* تحسين للشاشات الأفقية على الهواتف */
        @media (max-height: 600px) and (orientation: landscape) {
            body {
                padding: 10px;
            }

            .login-header {
                padding: 20px;
            }

            .login-body {
                padding: 20px;
            }

            .input-group {
                margin-bottom: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h2>مرحباً بك</h2>
            <p>يرجى إدخال بياناتك لتسجيل الدخول</p>
        </div>

        <div class="login-body">
            <form id="loginForm" onsubmit="event.preventDefault(); login();">
                <div class="input-group">
                    <label for="username">اسم المستخدم</label>
                    <input 
                        type="text" 
                        id="username" 
                        placeholder="أدخل اسم المستخدم" 
                        required
                        autocomplete="username"
                    />
                </div>

                <div class="input-group">
                    <label for="password">كلمة المرور</label>
                    <input 
                        type="password" 
                        id="password" 
                        placeholder="أدخل كلمة المرور" 
                        required
                        autocomplete="current-password"
                    />
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    تسجيل الدخول
                </button>

                <div class="loading" id="loading">
                    <div class="loading-spinner"></div>
                    <span style="margin-left: 10px;">جاري تسجيل الدخول...</span>
                </div>

                <div class="error-message" id="errorMessage">
                    فشل تسجيل الدخول. يرجى التحقق من بياناتك.
                </div>
            </form>

            <div class="extra-links">
                <a href="#">نسيت كلمة المرور؟</a>
                <a href="#">إنشاء حساب جديد</a>
            </div>
        </div>
    </div>

    <script>
        // الحصول على العناصر
        const usernameInput = document.getElementById("username");
        const passwordInput = document.getElementById("password");
        const loginBtn = document.getElementById("loginBtn");
        const loadingDiv = document.getElementById("loading");
        const errorMessageDiv = document.getElementById("errorMessage");

        async function login() {
            const username = usernameInput.value.trim();
            const password = passwordInput.value;

            // التحقق من إدخال البيانات
            if (!username || !password) {
                showError("الرجاء إدخال اسم المستخدم وكلمة المرور");
                return;
            }

            // إظهار مؤشر التحميل وتعطيل الزر
            loadingDiv.style.display = "block";
            loginBtn.disabled = true;
            loginBtn.style.opacity = "0.7";
            hideError();

            try {
                const res = await fetch("/login", {
                    method: "POST",
                    headers: { 
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ username, password })
                });

                if (res.ok) {
                    const data = await res.json();
                    if (data.token) {
                        localStorage.setItem("token", data.token);
                        // إضافة تأثير بسيط قبل الانتقال
                        loginBtn.style.transform = "scale(0.98)";
                        setTimeout(() => {
                            window.location.href = "/dashboard.html";
                        }, 200);
                    } else {
                        showError("لم يتم استلام رمز المصادقة");
                    }
                } else {
                    // معالجة أخطاء محددة حسب الحالة
                    if (res.status === 401) {
                        showError("اسم المستخدم أو كلمة المرور غير صحيحة");
                    } else if (res.status === 404) {
                        showError("خدمة تسجيل الدخول غير متاحة حالياً");
                    } else {
                        showError("حدث خطأ. يرجى المحاولة لاحقاً");
                    }
                }
            } catch (error) {
                console.error("Login error:", error);
                showError("خطأ في الاتصال بالخادم. يرجى التحقق من اتصالك بالإنترنت");
            } finally {
                // إخفاء مؤشر التحميل وإعادة تمكين الزر
                loadingDiv.style.display = "none";
                loginBtn.disabled = false;
                loginBtn.style.opacity = "1";
            }
        }

        function showError(message) {
            errorMessageDiv.textContent = message;
            errorMessageDiv.style.display = "block";
            
            // إخفاء الرسالة تلقائياً بعد 5 ثواني
            setTimeout(() => {
                if (errorMessageDiv.style.display === "block") {
                    hideError();
                }
            }, 5000);
        }

        function hideError() {
            errorMessageDiv.style.display = "none";
        }

        // إضافة معالجة لزر Enter
        usernameInput.addEventListener("keypress", function(e) {
            if (e.key === "Enter") {
                e.preventDefault();
                passwordInput.focus();
            }
        });

        passwordInput.addEventListener("keypress", function(e) {
            if (e.key === "Enter") {
                e.preventDefault();
                login();
            }
        });

        // تحسين للتجربة على الأجهزة اللمسية
        loginBtn.addEventListener("touchstart", function() {
            loginBtn.style.transform = "scale(0.98)";
        });

        loginBtn.addEventListener("touchend", function() {
            loginBtn.style.transform = "scale(1)";
        });
    </script>
</body>
</html>
